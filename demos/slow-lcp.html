<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slow LCP Demo</title>

  <img src="https://picsum.photos/1200/800" width="1200" height="800"
       loading="lazy" alt="Large hero image" />

</body>
</html>
